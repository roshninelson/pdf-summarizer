<!DOCTYPE html>
<html>
<head>
    <title>PDF Summarizer</title>
</head>
<body>

    <h1>PDF Summarizer</h1>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="pdf" required>

        <button type="submit">
            Summarize
        </button>

    </form>

    <h2>Summary:</h2>

    <p>{{ summary }}</p>

</body>
</html>
